<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>James's Math Garage 🏎️</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
 --bg:#0a0e1a;--card:#141a2e;--card2:#1c2440;
 --accent:#ff3030;--accent2:#ffcc00;--ok:#00e676;--bad:#ff5252;
 --text:#f0f4ff;--muted:#8892b8;--border:#2a3454;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
 background:linear-gradient(135deg,#0a0e1a 0%,#151b35 100%);color:var(--text);
 min-height:100vh;padding:20px;}
.wrap{max-width:900px;margin:0 auto}
header{text-align:center;margin-bottom:20px}
h1{font-size:2.4em;background:linear-gradient(135deg,#ff3030,#ffcc00);
 -webkit-background-clip:text;background-clip:text;color:transparent;
 letter-spacing:1px;font-weight:900}
.sub{color:var(--muted);font-size:1em;margin-top:6px}
.dashboard{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:18px 0}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;
 padding:12px;text-align:center}
.stat .num{font-size:1.8em;font-weight:900;color:var(--accent2)}
.stat .lbl{font-size:.75em;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.chapters{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.chapter{background:var(--card);border:1px solid var(--border);border-radius:14px;
 padding:18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.chapter:hover{border-color:var(--accent2);transform:translateY(-3px);
 box-shadow:0 10px 30px rgba(255,204,0,.15)}
.chapter.locked{opacity:.5;cursor:not-allowed}
.chapter.locked:hover{transform:none;border-color:var(--border);box-shadow:none}
.chapter.done{border-color:var(--ok)}
.ch-icon{font-size:2.5em;margin-bottom:8px}
.ch-title{font-size:1.1em;font-weight:800;margin-bottom:4px}
.ch-sub{font-size:.8em;color:var(--muted);margin-bottom:10px}
.ch-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.ch-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
 transition:width .4s}
.ch-meta{display:flex;justify-content:space-between;font-size:.75em;color:var(--muted);
 margin-top:6px}
.badge{position:absolute;top:10px;right:10px;background:var(--ok);color:#000;
 padding:3px 8px;border-radius:10px;font-size:.7em;font-weight:800}
.badge.lock{background:var(--muted)}

/* Quiz screen */
.quiz{background:var(--card);border:1px solid var(--border);border-radius:14px;
 padding:24px;display:none}
.quiz.show{display:block;animation:fade .3s}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.qhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;
 flex-wrap:wrap;gap:10px}
.qtitle{font-size:1.3em;font-weight:800}
.qprog{font-size:.85em;color:var(--muted)}
.qbar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:18px}
.qbar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
 transition:width .3s}

.scene{background:var(--card2);border-radius:12px;padding:18px;margin-bottom:14px;
 border-left:4px solid var(--accent2)}
.scene-title{font-size:.8em;color:var(--accent2);text-transform:uppercase;
 letter-spacing:1px;font-weight:800;margin-bottom:6px}
.scene-text{font-size:1em;line-height:1.5}

.problem{font-size:1.6em;font-weight:800;text-align:center;margin:18px 0;
 padding:18px;background:var(--bg);border-radius:12px;
 font-family:"SF Mono",Menlo,monospace}
.stack{display:inline-block;text-align:right;font-size:1.2em;line-height:1.5;
 font-family:"SF Mono",Menlo,monospace;letter-spacing:2px}
.stack .row{display:block;white-space:nowrap}
.stack .op{display:inline-block;width:1.2em;text-align:left;color:var(--accent2)}
.stack .line{display:block;border-top:3px solid var(--accent2);margin:4px 0}

.daily-btn{background:linear-gradient(135deg,#ff6b00,#ffcc00);color:#000;border:none;
 padding:16px 24px;font-size:1.05em;font-weight:800;border-radius:12px;cursor:pointer;
 font-family:inherit;text-transform:uppercase;letter-spacing:1px;transition:all .15s;
 display:block;width:100%;margin-bottom:16px;text-align:center}
.daily-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,107,0,.4)}
.xp-title{color:var(--accent2);font-weight:800;font-size:.85em}

.choices{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.choice{background:var(--card2);border:2px solid var(--border);color:var(--text);
 padding:16px;border-radius:10px;font-size:1.1em;font-weight:700;cursor:pointer;
 transition:all .15s;font-family:inherit}
.choice:hover:not(:disabled){border-color:var(--accent2);background:#252e4a}
.choice.right{background:var(--ok);border-color:var(--ok);color:#000;animation:pop .3s}
.choice.wrong{background:var(--bad);border-color:var(--bad);color:#fff;animation:shake .3s}
.choice:disabled{cursor:not-allowed}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}
 75%{transform:translateX(6px)}}

.input-row{display:flex;gap:10px;justify-content:center;align-items:center;margin:10px 0}
.ans-input{font-size:1.5em;padding:12px 18px;width:160px;text-align:center;
 background:var(--card2);border:2px solid var(--border);color:var(--text);
 border-radius:10px;font-weight:800;font-family:inherit}
.ans-input:focus{outline:none;border-color:var(--accent2)}
.btn{background:linear-gradient(135deg,var(--accent),#ff6b00);color:#fff;border:none;
 padding:14px 26px;font-size:1.05em;font-weight:800;border-radius:10px;cursor:pointer;
 font-family:inherit;text-transform:uppercase;letter-spacing:1px;transition:all .15s}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,48,48,.4)}
.btn.alt{background:linear-gradient(135deg,#1e3a8a,#3b82f6)}

.feedback{margin-top:14px;padding:14px;border-radius:10px;font-weight:600;
 display:none;line-height:1.5}
.feedback.show{display:block;animation:fade .3s}
.feedback.ok{background:rgba(0,230,118,.15);border:1px solid var(--ok);color:var(--ok)}
.feedback.no{background:rgba(255,82,82,.15);border:1px solid var(--bad);color:#ffaaaa}

.controls{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.back-btn{background:transparent;border:1px solid var(--border);color:var(--muted);
 padding:8px 16px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.9em}
.back-btn:hover{border-color:var(--accent2);color:var(--accent2)}

.celebrate{text-align:center;padding:20px}
.celebrate h2{font-size:2em;color:var(--accent2);margin-bottom:10px}
.celebrate .stars{font-size:3em;margin:14px 0}
.verse{background:var(--card2);border-left:4px solid var(--accent2);padding:14px;
 border-radius:8px;margin:14px 0;font-style:italic;color:#cdd6f4}
.verse-ref{display:block;text-align:right;font-style:normal;color:var(--accent2);
 font-weight:800;margin-top:6px;font-size:.85em}

.tip{background:rgba(255,204,0,.1);border-left:3px solid var(--accent2);
 padding:10px 14px;border-radius:6px;font-size:.9em;margin-top:10px;color:#ffe082}

/* Visual walkthrough for carrying/borrowing */
.wt{font-family:"SF Mono",Menlo,monospace;font-size:1.3em;line-height:1.6;
 display:inline-block;text-align:right;margin:10px auto;letter-spacing:3px}
.wt .carry{color:var(--accent2);font-size:.7em;vertical-align:super;font-weight:800}
.wt .borrow{color:var(--bad);font-size:.7em;text-decoration:line-through;vertical-align:super}
.wt .new-digit{color:var(--ok);font-weight:900}
.wt .row{display:block;white-space:nowrap}
.wt .op{color:var(--accent2);font-weight:800}
.wt .wt-line{display:block;border-top:3px solid var(--accent2);margin:2px 0}
.wt .ans-row{color:var(--ok);font-weight:900}
.wt-steps{margin-top:12px;font-family:inherit;font-size:.85em;line-height:1.8;letter-spacing:0}
.wt-step{margin-bottom:6px}
.wt-step .col-label{display:inline-block;background:var(--accent2);color:#000;
 padding:1px 8px;border-radius:4px;font-size:.8em;font-weight:800;margin-right:6px}

@media(max-width:600px){
 h1{font-size:1.8em}
 .dashboard{grid-template-columns:repeat(2,1fr)}
 .choices{grid-template-columns:1fr}
 .problem{font-size:1.3em}
}

.streak-fire{display:inline-block;animation:flame .6s infinite alternate}
@keyframes flame{from{transform:scale(1)}to{transform:scale(1.2)}}

.confetti{position:fixed;width:10px;height:10px;pointer-events:none;z-index:1000}
</style>
</head>
<body>
<div class="wrap">
<header>
 <h1>🏎️ James's Math Garage 🏁</h1>
 <div class="sub">3rd Grade Math · Powered by Porsches, Raptors & God's Word</div>
 <div id="player-badge" style="margin-top:10px;display:none;align-items:center;justify-content:center;gap:8px;font-size:.9em">
  <span style="color:var(--muted)">Playing as</span>
  <span id="player-name" style="color:var(--accent2);font-weight:800"></span>
  <button onclick="switchPlayer()" style="background:transparent;border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:.85em">Switch</button>
 </div>
</header>

<div class="dashboard">
 <div class="stat"><div class="num" id="s-xp">0</div><div class="lbl">XP Earned</div></div>
 <div class="stat"><div class="num" id="s-streak">0</div><div class="lbl">Streak 🔥</div></div>
 <div class="stat"><div class="num" id="s-stars">0</div><div class="lbl">Stars ⭐</div></div>
 <div class="stat"><div class="num" id="s-done">0</div><div class="lbl">Levels Done</div></div>
</div>

<div id="home">
 <div id="xp-title-bar" style="text-align:center;margin-bottom:12px;display:none">
  <span class="xp-title" id="xp-title-text"></span>
 </div>
 <button class="daily-btn" id="daily-btn" onclick="startDaily()" style="display:none">🎯 Daily Challenge — 5 Random Questions</button>
 <div class="chapters" id="chapters"></div>
</div>

<div class="quiz" id="quiz">
 <div class="qhead">
  <div>
   <div class="qtitle" id="q-title">Loading...</div>
   <div class="qprog" id="q-prog">Question 1 of 5</div>
  </div>
  <button class="back-btn" onclick="goHome()">← Garage</button>
 </div>
 <div class="qbar"><div class="qbar-fill" id="qbar"></div></div>
 <div id="q-body"></div>
</div>

</div>

<!-- Player picker overlay -->
<div id="picker-overlay" style="display:none;position:fixed;inset:0;background:rgba(10,14,26,.95);z-index:2000;align-items:center;justify-content:center;padding:20px">
 <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:480px;width:100%;text-align:center">
  <h2 style="font-size:1.6em;background:linear-gradient(135deg,#ff3030,#ffcc00);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:8px">Who's playing? 🏎️</h2>
  <p style="color:var(--muted);margin-bottom:20px;font-size:.95em">Pick your name so your progress saves on every device.</p>
  <div id="player-buttons" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px"></div>
  <div style="display:flex;gap:10px;align-items:center;margin-top:14px">
   <input id="custom-name" type="text" placeholder="Or type a new name…" maxlength="20" style="flex:1;padding:12px 14px;background:var(--card2);border:2px solid var(--border);color:var(--text);border-radius:10px;font-size:1em;font-family:inherit">
   <button class="btn" id="custom-go" style="padding:12px 18px;font-size:.9em">GO</button>
  </div>
  <div id="picker-status" style="margin-top:14px;color:var(--muted);font-size:.85em;min-height:18px"></div>
 </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-database-compat.js"></script>

<script>
// ===== FIREBASE SETUP =====
const firebaseConfig = {
 apiKey: "AIzaSyDEKx1uR_Ky0rMXrx20mZwl4lu5OTdMJmk",
 authDomain: "james-math-garage.firebaseapp.com",
 databaseURL: "https://james-math-garage-default-rtdb.firebaseio.com",
 projectId: "james-math-garage",
 storageBucket: "james-math-garage.firebasestorage.app",
 messagingSenderId: "63684182523",
 appId: "1:63684182523:web:6ea459ef99457091b4cb5e",
 measurementId: "G-1SPM672TV1"
};
let DB = null;
let CLOUD_OK = false;

// Lazily initialize Firebase the first time we need it.
// This handles the case where the SDK scripts are still loading when our code runs,
// and gracefully degrades to local-only if Firebase is unreachable.
function ensureFirebase(){
 if(CLOUD_OK) return true;
 if(typeof firebase === 'undefined') return false;
 try {
  if(firebase.apps && firebase.apps.length > 0){
   DB = firebase.database();
   CLOUD_OK = true;
   return true;
  }
  firebase.initializeApp(firebaseConfig);
  DB = firebase.database();
  CLOUD_OK = true;
  console.log('Firebase ready ✓');
  return true;
 } catch(e) {
  console.warn('Firebase init failed:', e.message);
  return false;
 }
}

// ===== PLAYER PROFILE =====
// Each player has their own progress, synced to Firebase by name.
// Falls back to localStorage if offline or Firebase unreachable.
let PLAYER = null; // current player name, lowercased for key
let PLAYER_DISPLAY = null; // capitalized for display
const DEFAULT_PLAYERS = ['James','Abigail','Mom','Dad'];

function sanitizeName(name){
 // Firebase keys can't contain . # $ [ ] / so strip them. Also lowercase for matching.
 return (name||'').trim().toLowerCase().replace(/[.#$\[\]\/\s]/g,'-').slice(0,30);
}
function displayName(name){
 const t = (name||'').trim();
 return t.charAt(0).toUpperCase() + t.slice(1);
}

function showPlayerPicker(){
 const overlay = document.getElementById('picker-overlay');
 overlay.style.display = 'flex';
 const btns = document.getElementById('player-buttons');
 btns.innerHTML = '';
 DEFAULT_PLAYERS.forEach(name=>{
  const b = document.createElement('button');
  b.className = 'btn';
  b.style.cssText = 'padding:18px;font-size:1.1em';
  b.textContent = name;
  b.onclick = ()=>selectPlayer(name);
  btns.appendChild(b);
 });
 document.getElementById('custom-go').onclick = ()=>{
  const v = document.getElementById('custom-name').value.trim();
  if(v.length>0) selectPlayer(v);
 };
 document.getElementById('custom-name').onkeydown = e=>{
  if(e.key==='Enter') document.getElementById('custom-go').click();
 };
}

function selectPlayer(name){
 PLAYER = sanitizeName(name);
 PLAYER_DISPLAY = displayName(name);
 try{ localStorage.setItem('jamesmath_player', PLAYER); localStorage.setItem('jamesmath_player_display', PLAYER_DISPLAY); }catch(e){}
 const status = document.getElementById('picker-status');
 status.textContent = 'Loading your progress…';
 // Load progress for this player from Firebase
 loadProgressFromCloud().then(()=>{
  document.getElementById('picker-overlay').style.display = 'none';
  renderChapters();
 }).catch(err=>{
  console.warn('Cloud load failed, using local:', err);
  document.getElementById('picker-overlay').style.display = 'none';
  renderChapters();
 });
}

function switchPlayer(){
 PLAYER = null;
 PLAYER_DISPLAY = null;
 STORE.data = null;
 try{ localStorage.removeItem('jamesmath_player'); localStorage.removeItem('jamesmath_player_display'); }catch(e){}
 showPlayerPicker();
}

// ===== PROGRESS STORAGE (cloud + local fallback) =====
const STORE = {data:null};
const EMPTY_PROGRESS = ()=>({xp:0,stars:0,streak:0,done:{},best:{}});

function loadProgress(){
 if(STORE.data) return STORE.data;
 // Try local cache first for fast render
 try{
  const key = PLAYER ? 'jamesmath_'+PLAYER : 'jamesmath';
  const raw = window.localStorage && localStorage.getItem(key);
  STORE.data = raw?JSON.parse(raw):EMPTY_PROGRESS();
 }catch(e){STORE.data=EMPTY_PROGRESS();}
 return STORE.data;
}

function loadProgressFromCloud(){
 if(!ensureFirebase() || !PLAYER) return Promise.resolve();
 return DB.ref('players/'+PLAYER).once('value').then(snap=>{
  const val = snap.val();
  if(val){
   STORE.data = Object.assign(EMPTY_PROGRESS(), val);
   // Also cache locally for offline access
   try{localStorage.setItem('jamesmath_'+PLAYER, JSON.stringify(STORE.data))}catch(e){}
  } else {
   // No cloud data yet — use whatever's in localStorage or start fresh
   loadProgress();
  }
 });
}

function saveProgress(){
 if(!STORE.data) return;
 // Always save locally first (fast, works offline)
 try{
  const key = PLAYER ? 'jamesmath_'+PLAYER : 'jamesmath';
  localStorage.setItem(key, JSON.stringify(STORE.data));
 }catch(e){}
 // Then push to cloud (fire and forget)
 if(ensureFirebase() && PLAYER){
  try{ DB.ref('players/'+PLAYER).set(STORE.data); }catch(e){console.warn('cloud save failed', e);}
 }
}

// ===== CONTENT POOLS =====
// All specs are real, verifiable manufacturer/IIHS data so problems
// don't contradict the facts shown alongside them.
const CARS = [
 // hp = peak horsepower, tq = lb-ft torque, zsixty = 0-60 mph (sec),
 // top = top speed mph, qm = quarter mile (sec), weight = curb weight lbs
 {name:"Porsche 911 GT3 RS",hp:518,tq:343,zsixty:3.0,top:184,qm:10.6,weight:3268},
 {name:"Ferrari SF90 Stradale",hp:986,tq:590,zsixty:2.5,top:211,qm:9.6,weight:3461},
 {name:"Aston Martin Valkyrie",hp:1139,tq:664,zsixty:2.5,top:217,qm:9.0,weight:2271},
 {name:"Lamborghini Revuelto",hp:1001,tq:535,zsixty:2.5,top:217,qm:9.7,weight:3906},
 {name:"Bugatti Chiron Super Sport",hp:1577,tq:1180,zsixty:2.4,top:304,qm:9.4,weight:4398},
 {name:"McLaren 750S",hp:740,tq:590,zsixty:2.7,top:206,qm:10.0,weight:3062},
 {name:"Koenigsegg Jesko Absolut",hp:1600,tq:1106,zsixty:2.5,top:330,qm:8.8,weight:3131},
 {name:"Pagani Huayra R",hp:838,tq:553,zsixty:2.7,top:238,qm:9.5,weight:2425},
];
const TRUCKS = [

 {name:"Ram TRX",hp:702,tq:650,zsixty:3.7,top:118,weight:6396},
 {name:"Mercedes Unimog U5023",hp:231,tq:664,zsixty:30,top:55,weight:18000},
 {name:"Land Rover Defender V8",hp:518,tq:461,zsixty:5.1,top:149,weight:5478},
 {name:"Jeep Wrangler Rubicon 392",hp:470,tq:470,zsixty:4.5,top:99,weight:5103},
 {name:"GMC Hummer EV",hp:1000,tq:1200,zsixty:3.0,top:106,weight:9063},
];
const SKYSCRAPERS = [
 // ft = total architectural height
 {name:"Burj Khalifa (Dubai)",ft:2717,floors:163},
 {name:"Merdeka 118 (Malaysia)",ft:2227,floors:118},
 {name:"Shanghai Tower (China)",ft:2073,floors:128},
 {name:"Makkah Royal Clock Tower (Mecca)",ft:1972,floors:120},
 {name:"Ping An Finance Centre (Shenzhen)",ft:1965,floors:115},
 {name:"Lotte World Tower (Seoul)",ft:1819,floors:123},
 {name:"One World Trade Center (NYC)",ft:1776,floors:104},
 {name:"Empire State Building (NYC)",ft:1454,floors:102},
 {name:"Willis Tower (Chicago)",ft:1451,floors:108},
 {name:"Eiffel Tower (Paris)",ft:1083,floors:0},
];
const ANIMALS = [
 {a:"Grizzly Bear",b:"Lion",winner:"Grizzly Bear",fact:"A grizzly's bite force is around 1,200 PSI vs a lion's 650 PSI."},
 {a:"Saltwater Crocodile",b:"Great White Shark",winner:"Saltwater Crocodile",fact:"Saltwater crocs have the strongest bite ever measured — about 3,700 PSI!"},
 {a:"African Elephant",b:"Rhino",winner:"African Elephant",fact:"Adult bull African elephants can weigh up to 14,000 lbs."},
 {a:"Gorilla",b:"Black Bear",winner:"Gorilla",fact:"Silverback gorillas can lift roughly 4 times their body weight."},
 {a:"Eagle",b:"Hawk",winner:"Eagle",fact:"Bald eagles have a wingspan of about 7 feet."},
 {a:"Polar Bear",b:"Tiger",winner:"Polar Bear",fact:"Polar bears can weigh up to 1,500 lbs — the largest land carnivore."},
];
// IIHS crash test facts — all real test parameters used for years
const CRASH_TESTS = [
 {name:"moderate overlap front",speed:40,desc:"the car hits a barrier with 40% of its front at 40 mph"},
 {name:"small overlap front",speed:40,desc:"the car hits a barrier with just 25% of its front at 40 mph"},
 {name:"updated side impact",speed:37,desc:"a heavy sled hits the side of the car at 37 mph"},
 {name:"original side impact",speed:31,desc:"a sled hits the side of the car at 31 mph"},
 {name:"roof strength test",speed:0,desc:"a metal plate pushes down on the roof to test rollover protection"},
 {name:"head restraint test",speed:0,desc:"a crash dummy gets jolted to test for whiplash protection"},
];
// Real US new vehicle MSRPs (rounded to thousands so they're easy to use in problems)
const VEHICLE_PRICES = [
 {name:"Ford F-150 Raptor R",price:111000},
 {name:"Ram TRX",price:99000},
 {name:"Toyota Tacoma TRD Pro",price:55000},
 {name:"Jeep Wrangler Rubicon",price:48000},
 {name:"Land Rover Defender 110",price:62000},
 {name:"Porsche 911 Carrera",price:122000},
 {name:"Chevrolet Corvette Stingray",price:69000},
 {name:"Ford Mustang GT",price:42000},
];
const VERSES = [
 {t:"I can do all things through Christ who strengthens me.",r:"Philippians 4:13"},
 {t:"Trust in the Lord with all your heart, and lean not on your own understanding.",r:"Proverbs 3:5"},

// ===== HELPERS =====
const r = (a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const pick = arr => arr[r(0,arr.length-1)];
const shuffle = a => a.slice().sort(()=>Math.random()-.5);

// Generate wrong answer choices near the correct one
function makeChoices(correct, spread=10, maxVal=null){
 const set = new Set([correct]);
 let attempts = 0;
 while(set.size<4 && attempts<50){
  attempts++;
  const off = r(-spread,spread);
  if(off===0) continue;
  let v = correct+off;
  if(v<0) continue;
  if(maxVal!==null && v>maxVal) continue;
  set.add(v);
 }
 return shuffle([...set]);
}

// ===== PROBLEM GENERATORS =====
// Each generator returns {scene, problem, answer, choices?, type}
// type: 'mc' (multiple choice) or 'input'

// Render addition/subtraction problems vertically (stacked), others as-is
function formatProblem(problem){
 // Match patterns like "234 + 567" or "890 - 123"
 const m = problem.match(/^(\d+)\s*([+\-])\s*(\d+)$/);
 if(m){
  const a = m[1], op = m[2], b = m[3];
  const maxLen = Math.max(a.length, b.length);
  const padA = a.padStart(maxLen+1); // +1 for the operator column
  const padB = b.padStart(maxLen);
  return `<div class="stack">` +
   `<div class="row">${padA.replace(/ /g,'&nbsp;')}</div>` +
   `<div class="row"><span class="op">${op}</span>${padB.replace(/ /g,'&nbsp;')}</div>` +
   `<div class="line">${'&nbsp;'.repeat(maxLen+1)}</div>` +
   `</div>`;
 }
 // For everything else (Round, compare, place value, missing addend) return as-is
 return problem;
}

   return {n:v.price, scene:`A new ${v.name} starts at about $${v.price.toLocaleString()}. What digit is in the {PLACE} place?`, fact:`That's a real starting price for a brand new one! 💰`};
  },
 ];
 const src = pick(sources)();
 const n = src.n;
 // Build place options based on the digit count of n
 const places = [];
 if(n>=1000) places.push({lbl:'thousands',v:Math.floor(n/1000)%10});
 if(n>=100) places.push({lbl:'hundreds',v:Math.floor(n/100)%10});
 if(n>=10) places.push({lbl:'tens',v:Math.floor(n/10)%10});
 places.push({lbl:'ones',v:n%10});
 const p = pick(places);
 return {
  scene:src.scene.replace('{PLACE}', p.lbl),
  problem:n.toLocaleString(),
  answer:p.v, type:'mc', spread:5, maxVal:9,
  fact:src.fact
 };
}

 {id:'compare',icon:'⚖️',title:'Animal Showdown',sub:'> < = comparing',
  needs:['place'],gens:[gen_compare,gen_compare,gen_compare,gen_compare,gen_compare]},
 {id:'missing',icon:'🧩',title:'Missing Number Mystery',sub:'find the gap',

  needs:['warmup'],gens:[gen_word_easy,gen_word_easy,gen_word_easy,gen_word_easy,gen_word_easy]},
 {id:'word_hard',icon:'🏆',title:'Champion Word Problems',sub:'harder real-world',
  needs:['add3hard','sub3hard'],gens:[gen_word_hard,gen_word_hard,gen_word_hard,gen_word_hard,gen_word_hard]},
 {id:'boss',icon:'👑',title:'BOSS LEVEL',sub:'all skills · 10 questions',

// ===== UI RENDERING =====
function isUnlocked(ch){
 if(ch.unlocked) return true;
 const p = loadProgress();
 return (ch.needs||[]).every(n=>p.done[n]);
}

function renderChapters(){
 const p = loadProgress();
 // Show player badge if a player is selected
 if(PLAYER_DISPLAY){
  document.getElementById('player-badge').style.display = 'flex';
  document.getElementById('player-name').textContent = PLAYER_DISPLAY;
 }
 document.getElementById('s-xp').textContent = p.xp;
 document.getElementById('s-streak').textContent = p.streak;
 document.getElementById('s-stars').textContent = p.stars||0;
 document.getElementById('s-done').textContent = Object.keys(p.done||{}).length;
 // Show XP title
 const titleBar = document.getElementById('xp-title-bar');
 const titleText = document.getElementById('xp-title-text');
 const currentTitle = getXpTitle(p.xp);
 const nextTitle = getNextTitle(p.xp);
 titleBar.style.display = 'block';
 titleText.innerHTML = currentTitle + (nextTitle ? ` <span style="color:var(--muted);font-weight:400;font-size:.85em">· Next: ${nextTitle.title} at ${nextTitle.xp} XP</span>` : ' · MAX RANK!');
 // Show daily challenge button if at least 1 level done
 const dailyBtn = document.getElementById('daily-btn');
 if(Object.keys(p.done||{}).length > 0){
  dailyBtn.style.display = 'block';
 } else {
  dailyBtn.style.display = 'none';
 }
 const root = document.getElementById('chapters');
 root.innerHTML = '';
 CHAPTERS.forEach(ch=>{
  const unlocked = isUnlocked(ch);
  const done = !!p.done[ch.id];
  const best = p.best[ch.id]||0;
  const total = ch.gens.length;
  const pct = done?100:0;
  const div = document.createElement('div');
  div.className = 'chapter'+(unlocked?'':' locked')+(done?' done':'');
  div.innerHTML = `
   ${done?'<span class="badge">✓ DONE</span>':(unlocked?'':'<span class="badge lock">🔒</span>')}
   <div class="ch-icon">${ch.icon}</div>
   <div class="ch-title">${ch.title}</div>
   <div class="ch-sub">${ch.sub}</div>
   <div class="ch-bar"><div class="ch-bar-fill" style="width:${pct}%"></div></div>
   <div class="ch-meta">
    <span>${total} questions</span>
    <span>${best?'Best: '+best+'/'+total:'Not started'}</span>
   </div>`;
  if(unlocked) div.onclick = ()=>startChapter(ch);
  root.appendChild(div);
 });
}

// ===== QUIZ STATE =====
let CURR = null;
function startChapter(ch){
 CURR = {ch, idx:0, score:0, wrongCount:0, qs:ch.gens.map(g=>g())};
 document.getElementById('home').style.display='none';
 document.getElementById('quiz').classList.add('show');
 document.getElementById('q-title').textContent = ch.icon+' '+ch.title;
 renderQ();
}
function goHome(){
 CURR = null;
 document.getElementById('quiz').classList.remove('show');
 document.getElementById('home').style.display='';
 renderChapters();
}

function renderQ(){
 const q = CURR.qs[CURR.idx];
 CURR.wrongCount = 0;
 const total = CURR.qs.length;
 document.getElementById('q-prog').textContent = `Question ${CURR.idx+1} of ${total} · Score: ${CURR.score}`;
 document.getElementById('qbar').style.width = (CURR.idx/total*100)+'%';
 const body = document.getElementById('q-body');
 let html = `
  <div class="scene">
   <div class="scene-title">📋 The Setup</div>
   <div class="scene-text">${q.scene}</div>
  </div>
  <div class="problem">${formatProblem(q.problem)}</div>`;
 if(q.type==='mc' || q.type==='mc-sym'){
  const choices = q.type==='mc-sym' ? q.choices : makeChoices(q.answer, q.spread||10, q.maxVal||null);
  html += '<div class="choices">';
  choices.forEach(c=>{
   html += `<button class="choice" data-v="${c}">${c}</button>`;
  });
  html += '</div>';
 } else {
  html += `
   <div class="input-row">
    <input class="ans-input" id="ans" type="number" inputmode="numeric" placeholder="?" autocomplete="off">
    <button class="btn" id="check">Check ✓</button>
   </div>`;
 }
 html += '<div class="feedback" id="fb"></div>';
 body.innerHTML = html;

 if(q.type==='mc' || q.type==='mc-sym'){
  body.querySelectorAll('.choice').forEach(b=>{
   b.onclick = ()=>handleAnswer(b.dataset.v, q, b);
  });
 } else {
  const inp = document.getElementById('ans');
  inp.focus();
  inp.onkeydown = e=>{if(e.key==='Enter') document.getElementById('check').click()};
  document.getElementById('check').onclick = ()=>{
   const v = inp.value.trim();
   if(v==='') return;
   handleAnswer(v, q, null);
  };
 }
}

function handleAnswer(val, q, btn){
 const correct = String(q.answer)===String(val);
 const fb = document.getElementById('fb');
 const p = loadProgress();
 if(correct){
  p.streak += 1;
  p.xp += 10;
  if(p.streak>0 && p.streak%5===0) p.xp += 25; // streak bonus
  CURR.score += 1;
  if(btn) btn.classList.add('right');
  document.querySelectorAll('.choice').forEach(b=>b.disabled=true);
  fb.className = 'feedback ok show';
  let msg = `<b>✅ CORRECT!</b> +10 XP`;
  if(p.streak>0 && p.streak%5===0) msg += ` · 🔥 ${p.streak} streak bonus +25!`;
  if(q.fact) msg += `<br><br>💡 ${q.fact}`;
  if(q.bibleVerse) msg += `<div class="verse">"${q.bibleVerse.t}"<span class="verse-ref">— ${q.bibleVerse.r}</span></div>`;
  fb.innerHTML = msg + '<div style="margin-top:10px"><button class="btn" onclick="nextQ()">Next →</button></div>';
 } else {
  p.streak = 0;
  CURR.wrongCount += 1;
  if(btn) btn.classList.add('wrong');
  fb.className = 'feedback no show';
  if(CURR.wrongCount < 2){
   // First wrong try — show hint, let him try again
   fb.innerHTML = `<b>❌ Not quite!</b> You've got one more try — take another look.
    <div class="tip">💡 Hint: ${getTip(q)}</div>
    <div style="margin-top:10px"><button class="btn alt" onclick="retryQ()">Try Again</button></div>`;
   if(btn) setTimeout(()=>{btn.classList.remove('wrong');btn.disabled=false},800);
  } else {
   // Second wrong try — show the walkthrough and move on
   document.querySelectorAll('.choice').forEach(b=>b.disabled=true);
   fb.innerHTML = `<b>That's okay — let's learn this one together!</b>
    <div class="tip" style="margin-top:10px;line-height:1.7">${getWalkthrough(q)}</div>
    <div style="margin-top:10px"><button class="btn" onclick="nextQ()">Got it, next →</button></div>`;
  }
 }
 saveProgress();
 document.getElementById('s-xp').textContent = p.xp;
 document.getElementById('s-streak').textContent = p.streak;
}

function getTip(q){
 const p = q.problem;
 if(p.includes('+')) return "Line up the digits by place value (ones under ones, tens under tens). Add the ones first, then carry if needed.";
 if(p.includes('-')) return "Subtract the ones first. If the top digit is smaller, borrow 1 from the tens column!";
 if(p.includes('___') && q.type==='mc-sym') return "Bigger number on the left = use >. Smaller = use <. Same = use =.";
 if(p.toLowerCase().includes('round')) return "Look at the digit to the right. 0-4 round DOWN, 5-9 round UP.";
 return "Read the problem one more time, slow and steady.";
}

// Build a step-by-step walkthrough using the real numbers from the question
function getWalkthrough(q){
 const p = q.problem;

 // ===== ADDITION VISUAL WALKTHROUGH =====
 if(p.includes('+') && !p.includes('___')){
  const m = p.match(/(\d+)\s*\+\s*(\d+)/);
  if(m){
   const a = parseInt(m[1]), b = parseInt(m[2]);
   const sum = a + b;
   // Break into digit arrays (right-aligned)
   const aStr = String(a), bStr = String(b), sStr = String(sum);
   const maxLen = Math.max(aStr.length, bStr.length, sStr.length);
   const aDigits = aStr.padStart(maxLen,'0').split('').map(Number);
   const bDigits = bStr.padStart(maxLen,'0').split('').map(Number);
   const sDigits = sStr.padStart(maxLen,'0').split('').map(Number);

   // Calculate carries
   const carries = new Array(maxLen+1).fill(0);
   for(let i=maxLen-1; i>=0; i--){
    const colSum = aDigits[i] + bDigits[i] + carries[i+1];
    if(colSum >= 10) carries[i] = 1;
   }

   // Build carry row
   let carryRow = '';
   for(let i=0; i<maxLen; i++){
    carryRow += carries[i] ? `<span class="carry">${carries[i]}</span>` : '&nbsp;';
   }

   // Build visual
   let html = `<div class="wt">`;
   if(carries.some(c=>c>0)) html += `<div class="row">&nbsp;${carryRow}</div>`;
   html += `<div class="row">&nbsp;${aStr.split('').join('&nbsp;')}</div>`;
   html += `<div class="row"><span class="op">+</span>${bStr.padStart(maxLen,'0').replace(/^0+/,' ').split('').join('&nbsp;').replace(/ /g,'&nbsp;')}</div>`;
   html += `<div class="wt-line">${'&nbsp;&nbsp;'.repeat(maxLen)}</div>`;
   html += `<div class="row ans-row">&nbsp;${sStr.split('').join('&nbsp;')}</div>`;
   html += `</div>`;

   // Build step-by-step text explanation
   const colNames = ['ones','tens','hundreds','thousands'];
   html += `<div class="wt-steps">`;
   let carry = 0;
   for(let i=maxLen-1; i>=0; i--){
    const colName = colNames[maxLen-1-i] || `col ${maxLen-i}`;
    const da = aDigits[i], db = bDigits[i];
    const colSum = da + db + carry;
    const write = colSum % 10;
    const newCarry = colSum >= 10 ? 1 : 0;
    html += `<div class="wt-step"><span class="col-label">${colName}</span> ${da} + ${db}`;
    if(carry) html += ` + ${carry} <span style="color:var(--accent2)">(carried)</span>`;
    html += ` = ${colSum}`;
    if(newCarry) html += ` → write <b>${write}</b>, carry <b style="color:var(--accent2)">1</b>`;
    html += `</div>`;
    carry = newCarry;
   }
   html += `<div class="wt-step" style="margin-top:8px"><b>Answer: ${a} + ${b} = <span style="color:var(--ok)">${sum}</span></b></div>`;
   html += `</div>`;
   return html;
  }
 }

 // ===== SUBTRACTION VISUAL WALKTHROUGH =====
 if(p.includes('-')){
  const m = p.match(/(\d+)\s*-\s*(\d+)/);
  if(m){
   const a = parseInt(m[1]), b = parseInt(m[2]);
   const diff = a - b;
   const aStr = String(a), bStr = String(b), dStr = String(diff);
   const maxLen = Math.max(aStr.length, bStr.length, dStr.length);
   const aDigits = aStr.padStart(maxLen,'0').split('').map(Number);
   const bDigits = bStr.padStart(maxLen,'0').split('').map(Number);

   // Figure out borrows
   const borrows = new Array(maxLen).fill(false);
   const workingA = [...aDigits];
   for(let i=maxLen-1; i>=0; i--){
    if(workingA[i] < bDigits[i]){
     borrows[i] = true;
     workingA[i] += 10;
     // Find next non-zero column to borrow from
     for(let j=i-1; j>=0; j--){
      workingA[j] -= 1;
      if(workingA[j] >= 0) break;
      workingA[j] += 10;
     }
    }
   }

   // Build visual — show original number with borrow marks
   let topRow = '&nbsp;';
   for(let i=0; i<maxLen; i++){
    if(borrows[i]){
     topRow += `<span class="borrow">${aDigits[i]}</span><span class="new-digit">${workingA[i]}</span>`;
    } else if(workingA[i] !== aDigits[i]){
     topRow += `<span class="borrow">${aDigits[i]}</span><span class="new-digit">${workingA[i]}</span>`;
    } else {
     topRow += aDigits[i];
    }
    if(i < maxLen-1) topRow += '&nbsp;';
   }

   let html = `<div class="wt">`;
   html += `<div class="row">${topRow}</div>`;
   html += `<div class="row"><span class="op">−</span>${bStr.padStart(maxLen,' ').split('').join('&nbsp;').replace(/ /g,'&nbsp;')}</div>`;
   html += `<div class="wt-line">${'&nbsp;&nbsp;'.repeat(maxLen)}</div>`;
   html += `<div class="row ans-row">&nbsp;${dStr.padStart(maxLen,' ').split('').join('&nbsp;').replace(/ /g,'&nbsp;')}</div>`;
   html += `</div>`;

   // Step-by-step text
   const colNames = ['ones','tens','hundreds','thousands'];
   html += `<div class="wt-steps">`;
   for(let i=maxLen-1; i>=0; i--){
    const colName = colNames[maxLen-1-i] || `col ${maxLen-i}`;
    const da = aDigits[i], db = bDigits[i], wa = workingA[i];
    const result = wa - db;
    html += `<div class="wt-step"><span class="col-label">${colName}</span> `;
    if(borrows[i]){
     html += `${da} is less than ${db}, so <b style="color:var(--accent2)">borrow 1</b> from the tens → ${wa} − ${db} = ${result}`;
    } else if(wa !== da){
     html += `${wa} − ${db} = ${result} <span style="color:var(--muted)">(was ${da}, gave 1 away)</span>`;
    } else {
     html += `${da} − ${db} = ${result}`;
    }
    html += `</div>`;
   }
   html += `<div class="wt-step" style="margin-top:8px"><b>Answer: ${a} − ${b} = <span style="color:var(--ok)">${diff}</span></b></div>`;
   html += `</div>`;
   return html;
  }
 }
 // Missing addend: "47 + ___ = 73"
 if(p.includes('___')){
  const m = p.match(/(\d+)\s*\+\s*_+\s*=\s*(\d+)/);
  if(m){
   const a = parseInt(m[1]), sum = parseInt(m[2]);
   const missing = sum - a;
   return `To find the missing number, do the opposite: <b>subtract</b>.<br>` +
          `<b>Step 1:</b> ${sum} - ${a} = ${missing}<br>` +
          `<b>Check:</b> ${a} + ${missing} = ${sum} ✓<br>` +
          `<b>Answer:</b> <b>${missing}</b>`;
  }
  // Compare: "425 ___ 517"
  const m2 = p.match(/(\d+)\s*_+\s*(\d+)/);
  if(m2){
   const a = parseInt(m2[1]), b = parseInt(m2[2]);
   const sym = a>b?'>':(a<b?'<':'=');
   const name = a>b?'greater than':(a<b?'less than':'equal to');
   return `Compare <b>${a}</b> and <b>${b}</b>.<br>` +
          `${a} is ${name} ${b}.<br>` +
          `The symbol that means "${name}" is <b>${sym}</b><br>` +
          `<b>Answer:</b> ${a} <b>${sym}</b> ${b}`;
  }
 }
 // Rounding
 if(p.toLowerCase().includes('round')){
  const m = p.match(/Round\s+(\d+)\s+to\s+nearest\s+(\d+)/i);
  if(m){
   const n = parseInt(m[1]), to = parseInt(m[2]);
   const ans = Math.round(n/to)*to;
   const lookDigit = to===10 ? n%10 : Math.floor(n/10)%10;
   const place = to===10 ? 'ones' : 'tens';
   const dir = lookDigit >= 5 ? 'UP' : 'DOWN';
   return `<b>Step 1:</b> To round ${n} to the nearest ${to}, look at the ${place} digit: <b>${lookDigit}</b><br>` +
          `<b>Step 2:</b> ${lookDigit} is ${lookDigit>=5?'5 or bigger':'less than 5'}, so round <b>${dir}</b>.<br>` +
          `<b>Answer:</b> ${n} rounds to <b>${ans}</b>`;
  }
 }
 // Place value: problem is just a number, scene mentions the place
 {
  const sceneMatch = q.scene.match(/in the (thousands|hundreds|tens|ones) place/);
  const nMatch = p.match(/[\d,]+/);
  if(sceneMatch && nMatch && q.type==='mc' && q.maxVal===9){
   const n = parseInt(nMatch[0].replace(/,/g,''));
   const place = sceneMatch[1];
   let digit, explain;
   if(place==='thousands'){digit = Math.floor(n/1000)%10; explain = '4th digit from the right';}
   else if(place==='hundreds'){digit = Math.floor(n/100)%10; explain = '3rd digit from the right';}
   else if(place==='tens'){digit = Math.floor(n/10)%10; explain = '2nd digit from the right';}
   else {digit = n%10; explain = 'last digit (1st from the right)';}
   return `In <b>${nMatch[0]}</b>, the ${place} place is the ${explain}.<br>` +
          `<b>Answer:</b> <b>${digit}</b>`;
  }
 }
 return `The correct answer is <b>${q.answer}</b>.`;
}

function retryQ(){
 const fb = document.getElementById('fb');
 fb.classList.remove('show');
 const inp = document.getElementById('ans');
 if(inp){inp.value='';inp.focus()}
}

function nextQ(){
 CURR.idx += 1;
 if(CURR.idx >= CURR.qs.length){
  finishChapter();
 } else {
  renderQ();
 }
}

function finishChapter(){
 const p = loadProgress();
 const total = CURR.qs.length;
 const score = CURR.score;
 const stars = score===total ? 3 : (score>=total*.7 ? 2 : (score>=total*.5 ? 1 : 0));
 if(stars>0){
  p.done[CURR.ch.id] = true;
  if(!p.best[CURR.ch.id] || score>p.best[CURR.ch.id]) p.best[CURR.ch.id]=score;
  p.stars = (p.stars||0) + stars;
  saveProgress();
 }
 const verse = pick(VERSES);
 const body = document.getElementById('q-body');
 body.innerHTML = `
  <div class="celebrate">
   <div class="stars">${'⭐'.repeat(stars)}${'☆'.repeat(3-stars)}</div>
   <h2>${stars===3?'PERFECT RUN! 🏆':(stars>=2?'Great Job!':(stars>=1?'Nice work!':'Keep practicing!'))}</h2>
   <p style="font-size:1.2em;margin:10px 0">You scored <b>${score}/${total}</b></p>
   <p style="color:var(--muted)">+${score*10} XP earned this run</p>
   <div class="verse">"${verse.t}"<span class="verse-ref">— ${verse.r}</span></div>
   <div class="controls" style="justify-content:center">
    <button class="btn" onclick="startChapter(CURR.ch)">🔄 Try Again</button>
    <button class="btn alt" onclick="goHome()">🏠 Back to Garage</button>
   </div>
  </div>`;
 document.getElementById('qbar').style.width = '100%';
 // confetti for perfect
 if(stars===3) confettiBurst();
}

function confettiBurst(){
 const colors = ['#ff3030','#ffcc00','#00e676','#3b82f6','#ff6b00'];
 for(let i=0;i<60;i++){
  const c = document.createElement('div');
  c.className='confetti';
  c.style.background = colors[i%colors.length];
  c.style.left = Math.random()*100+'%';
  c.style.top = '-20px';
  c.style.transform = `rotate(${Math.random()*360}deg)`;
  document.body.appendChild(c);
  const dx = (Math.random()-.5)*400;
  const dy = window.innerHeight + 50;
  c.animate([
   {transform:`translate(0,0) rotate(0deg)`,opacity:1},
   {transform:`translate(${dx}px,${dy}px) rotate(720deg)`,opacity:0}
  ],{duration:2500+Math.random()*1500,easing:'cubic-bezier(.2,.7,.3,1)'}).onfinish=()=>c.remove();
 }
}

// ===== XP TITLES =====
const XP_TITLES = [
 {xp:0, title:'Garage Newbie 🔧'},
 {xp:50, title:'Pit Crew Rookie ⚙️'},
 {xp:150, title:'Track Day Driver 🏎️'},
 {xp:300, title:'Speed Demon 💨'},
 {xp:500, title:'Turbo Champion 🏆'},
 {xp:750, title:'Supercar Master 🔥'},
 {xp:1000, title:'Race Legend 👑'},
 {xp:2000, title:'Math Garage GOAT 🐐'},
];
function getXpTitle(xp){
 let best = XP_TITLES[0];
 for(const t of XP_TITLES){ if(xp >= t.xp) best = t; }
 return best.title;
}
function getNextTitle(xp){
 for(const t of XP_TITLES){ if(xp < t.xp) return t; }
 return null; // already at max
}

// ===== DAILY CHALLENGE =====
function startDaily(){
 const p = loadProgress();
 // Pick 5 random generators from unlocked chapters
 const unlocked = CHAPTERS.filter(ch=>isUnlocked(ch) && ch.id!=='boss');
 if(unlocked.length===0) return;
 const allGens = [];
 unlocked.forEach(ch=>{ ch.gens.forEach(g=>{ if(!allGens.includes(g)) allGens.push(g); }); });
 // Pick 5 random generators (allow repeats if few unlocked)
 const picked = [];
 for(let i=0;i<5;i++) picked.push(pick(allGens));
 // Create a fake chapter for the daily challenge
 const dailyCh = {
  id:'daily', icon:'🎯', title:'Daily Challenge',
  sub:'5 random questions', gens:picked
 };
 startChapter(dailyCh);
}

// ===== INIT =====
function init(){
 // Check if there's a saved player on this device
 let savedPlayer = null, savedDisplay = null;
 try{
  savedPlayer = localStorage.getItem('jamesmath_player');
  savedDisplay = localStorage.getItem('jamesmath_player_display');
 }catch(e){}
 if(savedPlayer){
  // Auto-resume that player and pull from cloud
  PLAYER = savedPlayer;
  PLAYER_DISPLAY = savedDisplay || displayName(savedPlayer);
  // Render immediately from local cache (fast), then update from cloud
  loadProgress();
  renderChapters();
  loadProgressFromCloud().then(()=>renderChapters()).catch(()=>{});
 } else {
  // No player yet — show the picker
  showPlayerPicker();
 }
}

// Wait for the full page (including external Firebase scripts) to load before initializing.
if(document.readyState === 'complete'){
 init();
} else {
 window.addEventListener('load', init);
}
